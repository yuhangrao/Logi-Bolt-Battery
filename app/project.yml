name: BoltBattery
options:
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  generateEmptyDirectories: true

packages:
  BoltHIDPP:
    path: ".."

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  BoltBattery:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: BoltBattery
        excludes:
          - Assets.xcassets
      - Shared
      - BoltBattery/Assets.xcassets
    info:
      path: BoltBattery/Info.plist
      properties:
        LSUIElement: YES
        CFBundleName: BoltBattery
        CFBundleDisplayName: Bolt Battery
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
    entitlements:
      path: BoltBattery/BoltBattery.entitlements
      properties:
        com.apple.security.application-groups:
          - YOUR_TEAM_ID.industries.stark.boltbattery
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: industries.stark.boltbattery
        PRODUCT_NAME: BoltBattery
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: BoltHIDPP
        product: BoltHIDPP
      - sdk: WidgetKit.framework
      - target: BoltBatteryWidget

  BoltBatteryWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - BoltBatteryWidget
      - Shared
    info:
      path: BoltBatteryWidget/Info.plist
      properties:
        CFBundleDisplayName: Bolt Battery Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: BoltBatteryWidget/BoltBatteryWidget.entitlements
      properties:
        com.apple.security.app-sandbox: YES
        com.apple.security.application-groups:
          - YOUR_TEAM_ID.industries.stark.boltbattery
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: industries.stark.boltbattery.widget
        PRODUCT_NAME: BoltBatteryWidget
        SKIP_INSTALL: YES
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
